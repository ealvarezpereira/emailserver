name: Deploy to Railway

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Manager
        run: railway up --service email-manager --project 538ebff5-905d-4135-baee-47adf7bc7e06 --environment production --detach
        working-directory: ./email-manager
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Sender
        run: railway up --service email-sender --project 538ebff5-905d-4135-baee-47adf7bc7e06 --environment production --detach
        working-directory: ./email-sender
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}