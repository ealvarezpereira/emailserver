name: Deploy to Railway

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy Microservices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy email-manager
        run: railway up --service email-manager --project 538ebff5-905d-4135-baee-47adf7bc7e06 --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy email-sender
        run: railway up --service email-sender --project 538ebff5-905d-4135-baee-47adf7bc7e06 --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}